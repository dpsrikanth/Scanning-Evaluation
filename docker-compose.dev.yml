# Development override: run ONLY MySQL (+ phpMyAdmin) in Docker, API + Web locally
# Usage: docker compose -f docker-compose.dev.yml up -d
# Then open http://localhost:8081 — login: root / same MYSQL_ROOT_PASSWORD as .env

services:
  mysql:
    image: mysql:8.0
    container_name: scaneval-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ScanEval@2026}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ScanEval@2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: scaneval-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M

volumes:
  mysql-data:
    driver: local
