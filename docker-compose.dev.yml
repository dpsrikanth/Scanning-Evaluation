# Development override: run ONLY MySQL in Docker, API + Web locally
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: scaneval-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ScanEval@2026}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ScanEval@2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data:
    driver: local
