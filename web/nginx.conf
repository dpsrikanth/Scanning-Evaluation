server {
    listen 80;
    server_name localhost;

    # Allow uploads up to 50 MB (question papers, scanned PDFs, etc.)
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # PDF.js worker: browsers require a JavaScript MIME type for module workers (not octet-stream)
    location = /pdf.worker.min.mjs {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.mjs$ {
        default_type application/javascript;
    }

    # SPA routing — all non-file routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large file uploads
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
    }
}
